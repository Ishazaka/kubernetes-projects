 <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Kubernetes Project 2</title>
      <style>
        body {
          margin: 0;
          font-family: Arial, sans-serif;
          background: linear-gradient(135deg, #dbeafe, #eff6ff);
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
        }

        .card {
          background: white;
          padding: 40px;
          border-radius: 16px;
          box-shadow: 0 10px 25px rgba(0,0,0,0.1);
          text-align: center;
          width: 420px;
        }

        h1 {
          margin-bottom: 10px;
          color: #1e3a8a;
        }

        p {
          color: #334155;
          font-size: 18px;
          margin: 8px 0;
        }

        .version {
          margin-top: 20px;
          display: inline-block;
          background: #dbeafe;
          color: #1d4ed8;
          padding: 8px 14px;
          border-radius: 999px;
          font-weight: bold;
        }
      </style>
    </head>
    <body>
      <div class="card">
        <h1>Kubernetes Project 2</h1>
        <p>This app is running through a Kubernetes Deployment.</p>
        <p>Traffic is coming through a Kubernetes Service.</p>
        <div class="version">Version v1</div>
      </div>
    </body>
    </html>
